<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta http-equiv="X-UA-Compatible" content="IE=edge" />
      <meta
         name="viewport"
         content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover"
      />
      <title>b</title>
      <style>
         #app {
            height: 100%;
         }
         ::-webkit-scrollbar {
            width: 0 !important;
            height: 0 !important;
         }
         body {
            height: 100vh;
            margin: 0;
         }
         .wrap {
            height: 100%;
         }
         ul {
            margin: 0;
            overflow: scroll;
            padding-bottom: 36px;
            height: 100%;
            background: #f0ad4e;
         }
         .bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #bce8f1;
         }
      </style>
      <script src="https://cdn.bootcdn.net/ajax/libs/vue/2.6.14/vue.min.js"></script>
   </head>
   <body>
      <div id="app">
         <div class="wrap">
            <ul>
               <li v-for="item in list" :key="item.key">{{ item.text }}</li>
            </ul>
            <div class="bottom">
               <input @click="send1" v-model="inp" type="text" />
               <button @click="send">发送</button>
            </div>
         </div>
      </div>
      <script>
         new Vue({
            el: "#app",
            data() {
               return { list: [], inp: "" };
            },
            methods: {
               send1() {
                  this.list.push({
                     key: Date.now(),
                     text: window.innerHeight + "-" + document.documentElement.scrollTop,
                  });
               },
               send() {
                  this.list.push({ key: Date.now(), text: this.inp });
               },
            },
         });
      </script>
   </body>
</html>
